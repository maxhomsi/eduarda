  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; background:var(--black); }
    .offline-icon { font-size:4rem; margin-bottom:2rem; opacity:0.4; }
    .offline-logo { height:64px; margin:0 auto 3rem; filter:brightness(1.2); }
    .offline-title { font-family:"Cormorant Garamond",serif; font-size:3rem; font-weight:300; margin-bottom:1rem; }
    .offline-title em { color:var(--gold); font-style:italic; }
    .offline-sub { font-size:0.9rem; color:rgba(255,255,255,0.5); max-width:360px; line-height:1.8; margin-bottom:3rem; }
    .offline-contacts { display:flex; flex-direction:column; gap:1rem; margin-bottom:3rem; }
    .offline-contact { display:flex; align-items:center; justify-content:center; gap:0.75rem; color:var(--gold); font-size:0.85rem; }
    .retry-btn { background:var(--crimson); color:#fff; border:none; padding:1rem 2.5rem; font-family:"Jost",sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
    .retry-btn:hover { background:var(--crimson-h); }
  </style>
